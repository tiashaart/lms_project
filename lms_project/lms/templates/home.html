<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign In - LMS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
    body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { background: #fff; border-radius: 20px; box-shadow: 0 14px 28px rgba(0,0,0,0.1); width: 900px; max-width: 95%; min-height: 550px; display: flex; overflow: hidden; }
    .form-container { width: 50%; padding: 50px 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    .overlay-container { width: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 50px 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    h1 { font-size: 32px; margin-bottom: 20px; font-weight: 700; }
    .social-icons { display: flex; gap: 12px; margin: 20px 0; }
    .social-icons a { border: 1px solid #ddd; border-radius: 50%; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; color: #667eea; text-decoration: none; }
    input { background: #f0f2f5; border: none; padding: 14px 16px; margin: 8px 0; width: 100%; border-radius: 8px; outline: none; }
    button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-weight: bold; padding: 14px 45px; border: none; border-radius: 25px; cursor: pointer; margin-top: 10px; }
    .ghost-btn { background: transparent; border: 2px solid white; }
    @media (max-width: 768px) { .overlay-container { display: none; } .form-container { width: 100%; }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-container">
      <h1>Sign In</h1>
      <div class="social-icons">
        <a href="#"><i class="fab fa-facebook-f"></i></a>
        <a href="#"><i class="fab fa-google"></i></a>
        <a href="#"><i class="fab fa-linkedin-in"></i></a>
      </div>
      <input type="email" placeholder="Email Address" />
      <input type="password" placeholder="Password" />
      <a href="#">Forgot your password?</a>
      <button>SIGN IN</button>
    </div>
    <div class="overlay-container">
      <h1>Hey There!</h1>
      <p>Begin your amazing journey by creating an account with us today</p>
      <button class="ghost-btn">SIGN UP</button>
    </div>
  </div>
</body>
</html>
